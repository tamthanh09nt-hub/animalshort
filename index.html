<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch in an environment where it's read-only.
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.set && descriptor.configurable) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Attempted to overwrite window.fetch, but it is read-only. Ignoring.'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error('Failed to apply fetch polyfill fix:', e);
        }
      })();
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
